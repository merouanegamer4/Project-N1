<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@300;400;700&display=swap"
        rel="stylesheet">
  <title>Frontend Mentor | Profile card component</title>

</head>
<body>
  <div class="top">
    <img id="top" src="images/bg-pattern-top.svg" alt="">
  </div>
  <div class="bottom">
    <img id="bottom" src="images/bg-pattern-bottom.svg" alt="">
  </div>
  <div class="card">
    <div class="card-header">
      <img class="bg" src="images/bg-pattern-card.svg" alt="">
      <img class="vi" src="images/image-victor.jpg" alt="">
    </div>
    <div class="card-body">
      <!-- <div class="sec"> -->
        <p class="victor">Victor Crest <span>26</span></p>
        <p class="london">London</p>
      </div>
      <hr>
      <div class="F">80K <span>Followers</span></div>
      <div class="L">803K <span>Likes</span></div>
      <div class="P">1.4K <span>Photos</span></div>
    </div>

  </div>

  </div> -->
</body>
</html>
